<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/spec_cars_web/manifest.json" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        /* 100dvh = динамический viewport с учётом адресной строки */
        height: 100dvh;
        overflow: hidden;
      }
      #root {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
    </style>
    <title>spec_cars</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Скрытие адресной строки на мобильных
      function hideAddressBar() {
        // iOS Safari: скроллим вниз на 1px, затем обратно
        if (window.scrollY !== 0) window.scrollTo(0, 0);
        setTimeout(() => window.scrollTo(0, 1), 50);
      }

      // Пытаемся скрыть при загрузке
      window.addEventListener('load', () => {
        setTimeout(hideAddressBar, 300);
      });

      // При первом касании — скрываем адресную строку
      document.addEventListener('touchstart', function handler() {
        hideAddressBar();
        document.removeEventListener('touchstart', handler);
      });

      // При изменении размера viewport (появление/скрытие адресной строки)
      window.visualViewport?.addEventListener('resize', () => {
        setTimeout(hideAddressBar, 100);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
