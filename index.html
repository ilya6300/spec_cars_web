    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <style>
      html, body {
        margin: 0;
        padding: 0;
        /* 100vh = БОЛЬШОЙ viewport (без адресной строки).
           Когда адресная строка видна, 100vh > видимой области →
           появляется скролл → браузер скрывает адресную строку. */
        height: 100vh;
      }
      #root {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
    </style>
    <title>spec_cars</title>
  </head>

    <div id="root"></div>
